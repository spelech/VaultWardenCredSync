<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuickCreds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --prussian-blue: #031d44;
            --deep-space: #04395e;
            --muted-teal: #70a288;
            --tan: #dab785;
            --burnt-peach: #d5896f;
        }
        body { background-color: var(--prussian-blue); }
        .bg-deep { background-color: var(--deep-space); }
        .bg-teal { background-color: var(--muted-teal); }
        .text-teal { color: var(--muted-teal); }
        .text-tan { color: var(--tan); }
        
        .btn-primary { 
            background-color: var(--muted-teal);
            color: var(--prussian-blue);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen text-gray-200 flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-deep shadow-2xl rounded-3xl p-10 border border-white/5">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-black text-white tracking-tighter italic">Quick<span class="text-tan">Creds</span></h1>
            <p class="text-[10px] text-teal mt-2 uppercase tracking-[0.3em] font-bold">Secure Access Terminal</p>
        </header>

        <form id="login-form" class="space-y-8">
            <div>
                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3">Vault Master Password</label>
                <input type="password" id="password" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition" style="background-color: #031d44" required>
            </div>

            <button type="submit" class="btn-primary w-full font-black px-4 py-5 rounded-2xl shadow-lg uppercase tracking-widest text-sm">Unlock Terminal</button>
            <div id="login-result" class="mt-6 hidden text-burnt-peach text-xs font-bold text-center uppercase tracking-wider">Invalid Master Password</div>
        </form>
    </div>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const resDiv = document.getElementById('login-result');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    resDiv.classList.remove('hidden');
                }
            } catch (err) {
                resDiv.classList.remove('hidden');
                resDiv.innerText = 'Network error. Try again.';
            }
        });
    </script>
</body>
</html>
