<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Credential Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 flex items-center justify-center">
    <div class="max-w-xl w-full bg-white shadow rounded-lg p-8">
        <header class="mb-6 border-b pb-4">
            <h1 class="text-2xl font-bold text-gray-900">Portal Setup</h1>
            <p class="text-sm text-gray-600">Configure your encrypted database connections.</p>
        </header>

        <!-- Step 1: Auth -->
        <form id="setup-form" class="space-y-4">
            <div>
                <h3 class="font-medium text-lg border-b pb-2 mb-4">LiteLLM</h3>
                <label class="block text-sm font-medium text-gray-700">LiteLLM API URL</label>
                <input type="text" id="litellm_url" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" placeholder="http://litellm:4000" value="http://litellm:4000" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">LiteLLM Master Key</label>
                <input type="password" id="litellm_key" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" required>
            </div>

            <div class="pt-4">
                <h3 class="font-medium text-lg border-b pb-2 mb-4">Vaultwarden</h3>
                <label class="block text-sm font-medium text-gray-700">Vaultwarden URL</label>
                <input type="text" id="vw_url" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" placeholder="https://vault.domain.com" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Client ID (API Key)</label>
                <input type="text" id="vw_client_id" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Client Secret (API Key)</label>
                <input type="password" id="vw_client_secret" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Master Password (Required for bw login)</label>
                <input type="password" id="vw_password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2" required>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">Next: Map Folders</button>
            </div>
            <div id="setup-result" class="mt-4 hidden"></div>
        </form>

        <!-- Step 2: Folders -->
        <form id="folders-form" class="space-y-4 hidden mt-6 border-t pt-6">
            <h3 class="font-medium text-lg border-b pb-2 mb-4">Map Folders</h3>
            <p class="text-sm text-gray-600 mb-4">Select default Vaultwarden folders for auto-organization.</p>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">SSH Keys Folder</label>
                <select id="ssh_folder" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2"></select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">LiteLLM Keys Folder</label>
                <select id="litellm_folder" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2"></select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">External Credentials Folder</label>
                <select id="ext_folder" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2"></select>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700">Complete Setup</button>
            </div>
        </form>
    </div>
    
    <script>
        let setupData = {};

        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('setup-result');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<p class="text-blue-500">Authenticating and fetching folders...</p>';

            setupData = {
                litellm_url: document.getElementById('litellm_url').value,
                litellm_key: document.getElementById('litellm_key').value,
                vw_url: document.getElementById('vw_url').value,
                vw_client_id: document.getElementById('vw_client_id').value,
                vw_client_secret: document.getElementById('vw_client_secret').value,
                vw_password: document.getElementById('vw_password').value
            };

            try {
                const response = await fetch('/api/vaultwarden/login-test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(setupData)
                });
                
                const result = await response.json();
                if (!response.ok) throw new Error(result.detail || 'Login failed');

                resultDiv.innerHTML = '<p class="text-green-600 font-medium">Authenticated! Please map your folders below.</p>';
                document.getElementById('setup-form').querySelector('button').disabled = true;
                
                // Populate dropdowns
                const folders = result.folders || [];
                const optionsHtml = '<option value="">-- No Folder (Root) --</option>' + 
                    folders.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
                
                document.getElementById('ssh_folder').innerHTML = optionsHtml;
                document.getElementById('litellm_folder').innerHTML = optionsHtml;
                document.getElementById('ext_folder').innerHTML = optionsHtml;

                document.getElementById('folders-form').classList.remove('hidden');
            } catch (err) {
                resultDiv.innerHTML = `<p class="text-red-600 font-medium">Error: ${err.message}</p>`;
            }
        });

        document.getElementById('folders-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            setupData.ssh_folder_id = document.getElementById('ssh_folder').value || null;
            setupData.litellm_folder_id = document.getElementById('litellm_folder').value || null;
            setupData.external_folder_id = document.getElementById('ext_folder').value || null;

            const resultDiv = document.getElementById('setup-result');
            resultDiv.innerHTML = '<p class="text-blue-500">Saving final configuration...</p>';

            try {
                const response = await fetch('/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(setupData)
                });
                
                const result = await response.json();
                if (!response.ok) throw new Error(result.detail || 'Setup failed');

                resultDiv.innerHTML = '<p class="text-green-600 font-medium">Setup complete! Redirecting...</p>';
                setTimeout(() => window.location.href = '/', 1000);
            } catch (err) {
                resultDiv.innerHTML = `<p class="text-red-600 font-medium">Error: ${err.message}</p>`;
            }
        });
    </script>
</body>
</html>
