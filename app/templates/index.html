<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --charcoal-blue: #233d4d;
            --deep-charcoal: #1a2f3d;
            --pumpkin-spice: #fe7f2d;
            --golden-pollen: #fcca46;
            --muted-olive: #a1c181;
            --seagrass: #619b8a;
        }
        body { background-color: var(--charcoal-blue); }
        .bg-deep { background-color: var(--deep-charcoal); }
        .bg-teal { background-color: var(--seagrass); }
        .bg-tan { background-color: var(--golden-pollen); }
        .bg-peach { background-color: var(--pumpkin-spice); }
        
        .text-teal { color: var(--seagrass); }
        .text-golden-pollen-experiment { color: var(--golden-pollen); }
        .text-peach { color: var(--pumpkin-spice); }
        
        .border-teal { border-color: var(--seagrass); }
        .border-tan { border-color: var(--golden-pollen); }
        .border-peach { border-color: var(--pumpkin-spice); }
        
        .ring-teal:focus { --tw-ring-color: var(--seagrass); }
        
        .btn-primary { 
            background-color: var(--seagrass);
            color: var(--charcoal-blue);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .sidebar-btn {
            border-left: 4px solid transparent;
            transition: all 0.2s;
        }
        .sidebar-btn.active {
            background-color: var(--deep-charcoal);
            color: var(--golden-pollen);
            border-left-color: var(--golden-pollen);
        }
    </style>
</head>
<body class="min-h-screen text-gray-200 p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 border-b border-gray-700/50 pb-8 flex flex-col md:flex-row md:items-end justify-between">
            <div>
                <h1 class="text-5xl font-black text-white tracking-tighter">Quick<span class=.text-golden-pollen-experiment">Creds</span></h1>
                <p class="text-xs text-teal mt-2 uppercase tracking-widest font-bold">Secure Key Provisioning & Auto-Organization</p>
            </div>
            <div class="mt-4 md:mt-0">
                <span id="system-status" class="inline-flex items-center px-4 py-2 rounded-full text-xs font-bold bg-teal/10 text-teal border border-teal/30 shadow-sm">
                    <span class="w-2 h-2 rounded-full bg-teal mr-3 animate-pulse"></span>
                    Vaultwarden Connected
                </span>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Sidebar Navigation -->
            <nav class="lg:col-span-3 space-y-3">
                <button onclick="switchTab('ssh')" id="tab-ssh" class="sidebar-btn active w-full text-left px-5 py-4 rounded-xl font-bold flex items-center text-white">
                    <span class="mr-4 text-xl">🔑</span> SSH Keys
                </button>
                <button onclick="switchTab('litellm')" id="tab-litellm" class="sidebar-btn w-full text-left px-5 py-4 rounded-xl font-bold flex items-center text-gray-400 hover:text-white hover:bg-white/5">
                    <span class="mr-4 text-xl">⚡</span> LiteLLM Keys
                </button>
                <button onclick="switchTab('external')" id="tab-external" class="sidebar-btn w-full text-left px-5 py-4 rounded-xl font-bold flex items-center text-gray-400 hover:text-white hover:bg-white/5">
                    <span class="mr-4 text-xl">📦</span> External Creds
                </button>
                
                <div class="pt-10">
                    <button onclick="logout()" class="w-full text-left px-5 py-3 rounded-xl font-bold flex items-center text-peach/60 hover:text-peach hover:bg-peach/5 transition">
                        <span class="mr-4">📤</span> Logout
                    </button>
                </div>
            </nav>

            <!-- Content Area -->
            <div class="lg:col-span-9 bg-deep shadow-2xl rounded-3xl p-10 border border-white/5 min-h-[500px]">
                <div id="content-area">
                    <!-- SSH Section -->
                    <div id="section-ssh" class="tab-section">
                        <h2 class="text-3xl font-bold text-white mb-8">SSH Key Provisioning</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-3xl mb-10">
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Key Name</label>
                                <input type="text" id="ssh-name" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition placeholder:text-gray-600" style="background-color: #1a2f3d" placeholder="e.g. production-deploy">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Key Type</label>
                                <select id="ssh-type" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition cursor-pointer" style="background-color: #1a2f3d">
                                    <option value="ed25519">Ed25519 (Recommended)</option>
                                    <option value="rsa">RSA 4096-bit</option>
                                </select>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Comment <span class="text-[9px] text-gray-600 normal-case ml-2 font-medium">(Optional metadata)</span></label>
                                <input type="text" id="ssh-comment" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition placeholder:text-gray-600" style="background-color: #1a2f3d" placeholder="e.g. user@hostname">
                            </div>
                        </div>
                        <button onclick="generateSSH()" class="btn-primary font-black px-10 py-4 rounded-2xl shadow-lg uppercase tracking-tighter text-lg">1. Generate Keypair</button>
                        <div id="ssh-result" class="mt-12 hidden"></div>
                    </div>

                    <!-- LiteLLM Section -->
                    <div id="section-litellm" class="tab-section hidden">
                        <h2 class="text-3xl font-bold text-white mb-8">LiteLLM Virtual Key</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mb-10">
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Key Alias</label>
                                <input type="text" id="llm-alias" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition placeholder:text-gray-600" style="background-color: #1a2f3d" placeholder="e.g. dev-app-key">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Key Type</label>
                                <select id="llm-key-type" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition cursor-pointer" style="background-color: #1a2f3d">
                                    <option value="api">API Only (Inference)</option>
                                    <option value="mgmt">Management Only (Admin)</option>
                                    <option value="both">Both (Full Access)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Owned By</label>
                                <input list="users-list" id="llm-user" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition placeholder:text-gray-600" style="background-color: #1a2f3d" placeholder="Search or type User ID...">
                                <datalist id="users-list"></datalist>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Team ID</label>
                                <input list="teams-list" id="llm-team" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition placeholder:text-gray-600" style="background-color: #1a2f3d" placeholder="Search or type Team ID...">
                                <datalist id="teams-list"></datalist>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Max Budget ($)</label>
                                <input type="number" id="llm-budget" step="0.01" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition placeholder:text-gray-600" style="background-color: #1a2f3d" placeholder="e.g. 5.00">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Allowed Models</label>
                                <input type="text" id="llm-models" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition placeholder:text-gray-600" style="background-color: #1a2f3d" placeholder="gpt-4, claude-3-haiku">
                            </div>
                        </div>
                        <button onclick="generateLiteLLM()" class="btn-primary font-black px-10 py-4 rounded-2xl shadow-lg uppercase tracking-tighter text-lg">1. Generate Key</button>
                        <div id="llm-result" class="mt-12 hidden"></div>
                    </div>

                    <!-- External Section -->
                    <div id="section-external" class="tab-section hidden">
                        <h2 class="text-3xl font-bold text-white mb-8">Store External Credential</h2>
                        <div class="space-y-8 max-w-3xl">
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Name</label>
                                <input type="text" id="ext-name" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition placeholder:text-gray-600" style="background-color: #1a2f3d" placeholder="e.g. GCP Service Account JSON">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">Credential Data</label>
                                <textarea id="ext-data" rows="10" class="block w-full rounded-xl bg-prussian-blue border-transparent text-white shadow-inner border p-4 focus:ring-2 focus:ring-teal outline-none transition font-mono text-sm placeholder:text-gray-600" style="background-color: #1a2f3d" placeholder='{"type": "service_account", ...}'></textarea>
                            </div>
                        </div>
                        <button onclick="storeExternal()" class="btn-primary mt-10 font-black px-10 py-4 rounded-2xl shadow-lg uppercase tracking-tighter text-lg">Sync to Vaultwarden</button>
                        <div id="ext-result" class="mt-12 hidden"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
