<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neutral-black: #121212;
            --neutral-dark: #1e1e1e;
            --neutral-border: #333333;
            --cherry-rose: #a4243b;
            --sand: #d8c99b;
            --golden-apricot: #d8973c;
            --pure-white: #ffffff;
        }
        body { background-color: var(--neutral-black); }
        .bg-deep { background-color: var(--neutral-dark); }
        .bg-accent { background-color: var(--golden-apricot); }
        .bg-cherry { background-color: var(--cherry-rose); }
        
        .text-white { color: var(--pure-white) !important; }
        .text-accent { color: var(--golden-apricot); }
        .text-muted { color: #a1a1a1; }
        
        .border-accent { border-color: var(--golden-apricot); }
        .border-neutral { border-color: var(--neutral-border); }
        
        .btn-primary { 
            background-color: var(--golden-apricot);
            color: var(--neutral-black);
            font-weight: 900;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }
        
        .sidebar-btn {
            border-left: 4px solid transparent;
            color: #888888;
            transition: all 0.2s;
        }
        .sidebar-btn.active {
            background-color: var(--neutral-dark);
            color: var(--pure-white);
            border-left-color: var(--cherry-rose);
        }
    </style>
</head>
<body class="min-h-screen text-white p-2 md:p-5">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 border-b border-neutral pb-4 flex flex-col md:flex-row md:items-end justify-between">
            <div>
                <h1 class="text-5xl font-black text-white tracking-tighter italic">Quick<span class="text-accent">Creds</span></h1>
                <p class="text-xs text-muted mt-1 uppercase tracking-widest font-bold">Secure Key Provisioning & Auto-Organization</p>
            </div>
            <div class="mt-2 md:mt-0">
                <span id="system-status" class="inline-flex items-center px-2 py-1 rounded-full text-xs font-bold bg-white/5 text-white border border-white/20 shadow-sm">
                    <span class="w-2 h-2 rounded-full bg-accent mr-2 animate-pulse"></span>
                    Vaultwarden Connected
                </span>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-5">
            <!-- Sidebar Navigation -->
            <nav class="lg:col-span-3 space-y-1.5">
                <button onclick="switchTab('ssh')" id="tab-ssh" class="sidebar-btn active w-full text-left px-3 py-2 rounded-xl font-bold flex items-center">
                    <span class="mr-2 text-xl">🔑</span> SSH Keys
                </button>
                <button onclick="switchTab('litellm')" id="tab-litellm" class="sidebar-btn w-full text-left px-3 py-2 rounded-xl font-bold flex items-center hover:text-white hover:bg-white/5">
                    <span class="mr-2 text-xl">⚡</span> LiteLLM Keys
                </button>
                <button onclick="switchTab('external')" id="tab-external" class="sidebar-btn w-full text-left px-3 py-2 rounded-xl font-bold flex items-center hover:text-white hover:bg-white/5">
                    <span class="mr-2 text-xl">📦</span> External Creds
                </button>
                
                <div class="pt-5">
                    <button onclick="logout()" class="w-full text-left px-3 py-1.5 rounded-xl font-bold flex items-center text-cherry/60 hover:text-cherry hover:bg-cherry/5 transition">
                        <span class="mr-2">📤</span> Logout
                    </button>
                </div>
            </nav>

            <!-- Content Area -->
            <div class="lg:col-span-9 bg-deep shadow-2xl rounded-3xl p-5 border border-white/5 min-h-[500px]">
                <div id="content-area">
                    <!-- SSH Section -->
                    <div id="section-ssh" class="tab-section">
                        <h2 class="text-3xl font-bold text-white mb-4">SSH Key Provisioning</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-3xl mb-5">
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Key Name</label>
                                <input type="text" id="ssh-name" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition placeholder:text-gray-600" style="background-color: var(--neutral-black)" placeholder="e.g. production-deploy">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Key Type</label>
                                <select id="ssh-type" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition cursor-pointer" style="background-color: var(--neutral-black)">
                                    <option value="ed25519">Ed25519 (Recommended)</option>
                                    <option value="rsa">RSA 4096-bit</option>
                                </select>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Comment <span class="text-[9px] text-gray-600 normal-case ml-2 font-medium">(Optional metadata)</span></label>
                                <input type="text" id="ssh-comment" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition placeholder:text-gray-600" style="background-color: var(--neutral-black)" placeholder="e.g. user@hostname">
                            </div>
                        </div>
                        <button onclick="generateSSH()" class="btn-primary px-5 py-2 rounded-2xl shadow-lg uppercase tracking-tighter text-lg">1. Generate Keypair</button>
                        <div id="ssh-result" class="mt-6 hidden"></div>
                    </div>

                    <!-- LiteLLM Section -->
                    <div id="section-litellm" class="tab-section hidden">
                        <h2 class="text-3xl font-bold text-white mb-4">LiteLLM Virtual Key</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mb-5">
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Key Alias</label>
                                <input type="text" id="llm-alias" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition placeholder:text-gray-600" style="background-color: var(--neutral-black)" placeholder="e.g. dev-app-key">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Key Type</label>
                                <select id="llm-key-type" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition cursor-pointer" style="background-color: var(--neutral-black)">
                                    <option value="api">API Only (Inference)</option>
                                    <option value="mgmt">Management Only (Admin)</option>
                                    <option value="both">Both (Full Access)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Owned By</label>
                                <input list="users-list" id="llm-user" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition placeholder:text-gray-600" style="background-color: var(--neutral-black)" placeholder="Search or type User ID...">
                                <datalist id="users-list"></datalist>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Team ID</label>
                                <input list="teams-list" id="llm-team" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition placeholder:text-gray-600" style="background-color: var(--neutral-black)" placeholder="Search or type Team ID...">
                                <datalist id="teams-list"></datalist>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Max Budget ($)</label>
                                <input type="number" id="llm-budget" step="0.01" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition placeholder:text-gray-600" style="background-color: var(--neutral-black)" placeholder="e.g. 5.00">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Allowed Models</label>
                                <input type="text" id="llm-models" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition placeholder:text-gray-600" style="background-color: var(--neutral-black)" placeholder="gpt-4, claude-3-haiku">
                            </div>
                        </div>
                        <button onclick="generateLiteLLM()" class="btn-primary px-5 py-2 rounded-2xl shadow-lg uppercase tracking-tighter text-lg">1. Generate Key</button>
                        <div id="llm-result" class="mt-6 hidden"></div>
                    </div>

                    <!-- External Section -->
                    <div id="section-external" class="tab-section hidden">
                        <h2 class="text-3xl font-bold text-white mb-4">Store External Credential</h2>
                        <div class="space-y-4 max-w-3xl">
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Name</label>
                                <input type="text" id="ext-name" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition placeholder:text-gray-600" style="background-color: var(--neutral-black)" placeholder="e.g. GCP Service Account JSON">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1.5">Credential Data</label>
                                <textarea id="ext-data" rows="10" class="block w-full rounded-xl border-transparent text-white shadow-inner border p-2 outline-none transition font-mono text-sm placeholder:text-gray-600" style="background-color: var(--neutral-black)" placeholder='{"type": "service_account", ...}'></textarea>
                            </div>
                        </div>
                        <button onclick="storeExternal()" class="btn-primary mt-5 px-5 py-2 rounded-2xl shadow-lg uppercase tracking-tighter text-lg">Sync to Vaultwarden</button>
                        <div id="ext-result" class="mt-6 hidden"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
