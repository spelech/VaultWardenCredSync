<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credential Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --festool-green: #009e5e;
            --dark-gray: #111827;
            --medium-gray: #1f2937;
        }
        .bg-festool { background-color: var(--festool-green); }
        .text-festool { color: var(--festool-green); }
        .border-festool { border-color: var(--festool-green); }
        .ring-festool:focus { --tw-ring-color: var(--festool-green); }
    </style>
</head>
<body class="bg-[#111827] min-h-screen text-gray-200 p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <header class="mb-12 border-b border-gray-700 pb-6 flex flex-col md:flex-row md:items-end justify-between">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tight">Credential Portal</h1>
                <p class="text-sm text-gray-500 mt-2 uppercase tracking-widest font-bold">Secure Key Provisioning & Auto-Organization</p>
            </div>
            <div class="mt-4 md:mt-0">
                <span id="system-status" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-green-900/30 text-festool border border-festool/30">
                    <span class="w-2 h-2 rounded-full bg-festool mr-2 animate-pulse"></span>
                    Vaultwarden Connected
                </span>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar Navigation -->
            <nav class="lg:col-span-3 space-y-2">
                <button onclick="switchTab('ssh')" id="tab-ssh" class="tab-btn w-full text-left px-4 py-3 rounded-lg font-bold transition flex items-center bg-[#1f2937] text-festool border-l-4 border-festool">
                    <span class="mr-3">🔑</span> SSH Keys
                </button>
                <button onclick="switchTab('litellm')" id="tab-litellm" class="tab-btn w-full text-left px-4 py-3 rounded-lg font-bold transition flex items-center text-gray-400 hover:bg-[#1f2937] hover:text-white">
                    <span class="mr-3">⚡</span> LiteLLM Keys
                </button>
                <button onclick="switchTab('external')" id="tab-external" class="tab-btn w-full text-left px-4 py-3 rounded-lg font-bold transition flex items-center text-gray-400 hover:bg-[#1f2937] hover:text-white">
                    <span class="mr-3">📦</span> External Creds
                </button>
            </nav>

            <!-- Content Area -->
            <div class="lg:col-span-9 bg-[#1f2937] shadow-2xl rounded-2xl p-8 border border-gray-700 min-h-[400px]">
                <div id="content-area">
                    <!-- SSH Section -->
                    <div id="section-ssh" class="tab-section">
                        <h2 class="text-2xl font-bold text-white mb-6">SSH Key Provisioning</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mb-6">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Key Name</label>
                                <input type="text" id="ssh-name" class="block w-full rounded-lg bg-[#111827] border-gray-700 text-white shadow-sm border p-3 focus:border-festool outline-none transition" placeholder="e.g. production-deploy">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Key Type</label>
                                <select id="ssh-type" class="block w-full rounded-lg bg-[#111827] border-gray-700 text-white shadow-sm border p-3 focus:border-festool outline-none transition cursor-pointer">
                                    <option value="ed25519">Ed25519 (Recommended)</option>
                                    <option value="rsa">RSA 4096-bit</option>
                                </select>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Comment <span class="text-[10px] text-gray-600 normal-case ml-2">(Optional metadata stored inside the key file)</span></label>
                                <input type="text" id="ssh-comment" class="block w-full rounded-lg bg-[#111827] border-gray-700 text-white shadow-sm border p-3 focus:border-festool outline-none transition" placeholder="e.g. user@hostname">
                            </div>
                        </div>
                        <button onclick="generateSSH()" class="bg-festool text-white font-bold px-8 py-3 rounded-xl shadow-lg hover:brightness-110 transition active:scale-95">1. Generate Keypair</button>
                        <div id="ssh-result" class="mt-8 hidden"></div>
                    </div>

                    <!-- LiteLLM Section -->
                    <div id="section-litellm" class="tab-section hidden">
                        <h2 class="text-2xl font-bold text-white mb-6">LiteLLM Virtual Key</h2>
                        <div class="max-w-md mb-6">
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Key Alias</label>
                            <input type="text" id="llm-name" class="block w-full rounded-lg bg-[#111827] border-gray-700 text-white shadow-sm border p-3 focus:border-festool outline-none transition" placeholder="e.g. internal-dev-app">
                        </div>
                        <button onclick="generateLiteLLM()" class="bg-festool text-white font-bold px-8 py-3 rounded-xl shadow-lg hover:brightness-110 transition active:scale-95">1. Generate Key</button>
                        <div id="llm-result" class="mt-8 hidden"></div>
                    </div>

                    <!-- External Section -->
                    <div id="section-external" class="tab-section hidden">
                        <h2 class="text-2xl font-bold text-white mb-6">Store External Credential</h2>
                        <div class="space-y-6 max-w-2xl">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Name</label>
                                <input type="text" id="ext-name" class="block w-full rounded-lg bg-[#111827] border-gray-700 text-white shadow-sm border p-3 focus:border-festool outline-none transition" placeholder="e.g. GCP Service Account JSON">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Credential Data</label>
                                <textarea id="ext-data" rows="8" class="block w-full rounded-lg bg-[#111827] border-gray-700 text-white shadow-sm border p-3 focus:border-festool outline-none transition font-mono text-sm" placeholder='{"type": "service_account", ...}'></textarea>
                            </div>
                        </div>
                        <button onclick="storeExternal()" class="mt-8 bg-festool text-white font-bold px-8 py-3 rounded-xl shadow-lg hover:brightness-110 transition active:scale-95">Sync to Vaultwarden</button>
                        <div id="ext-result" class="mt-8 hidden"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
