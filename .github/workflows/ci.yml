name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y openssh-client curl jq nodejs npm
        npm install -g @bitwarden/cli
        
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        python3 -m pytest

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract version
        id: vars
        run: echo "tag=$(cat VERSION)" >> $GITHUB_OUTPUT
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vaultwardencredsync:latest
            ghcr.io/${{ github.repository_owner }}/vaultwardencredsync:${{ steps.vars.outputs.tag }}
